<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowL" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto">
      <path d="M9,0 L9,6 L0,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <text x="60" y="76" font-size="40" font-weight="800" fill="#0f172a" letter-spacing="-0.5">POST /api/generate-plan &#8212; request lifecycle</text>
  <text x="60" y="112" font-size="18" font-weight="500" fill="#475569">From hypothesis to validated plan: parallel feedback &amp; evidence retrieval, AI generation with Zod self-repair, pricing enrichment, critic pass.</text>
  <line x1="60" y1="142" x2="1860" y2="142" stroke="#e2e8f0" stroke-width="2"/>

  <!-- LANE HEADERS -->

  <g filter="url(#cardShadow)">
    <rect x="120" y="180" width="240" height="64" rx="32" fill="#ffffff" stroke="#bae6fd"/>
  </g>
  <circle cx="158" cy="212" r="10" fill="#0ea5e9"/>
  <text x="180" y="207" font-size="11" font-weight="700" fill="#0ea5e9" letter-spacing="1.5">CLIENT</text>
  <text x="180" y="228" font-size="16" font-weight="700" fill="#0f172a">Browser SPA</text>

  <g filter="url(#cardShadow)">
    <rect x="480" y="180" width="240" height="64" rx="32" fill="#ffffff" stroke="#c7d2fe"/>
  </g>
  <circle cx="518" cy="212" r="10" fill="#6366f1"/>
  <text x="540" y="207" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="1.5">SERVER</text>
  <text x="540" y="228" font-size="16" font-weight="700" fill="#0f172a">Next.js  &#183;  lib/</text>

  <g filter="url(#cardShadow)">
    <rect x="840" y="180" width="240" height="64" rx="32" fill="#ffffff" stroke="#a7f3d0"/>
  </g>
  <circle cx="878" cy="212" r="10" fill="#10b981"/>
  <text x="900" y="207" font-size="11" font-weight="700" fill="#10b981" letter-spacing="1.5">PERSISTENCE</text>
  <text x="900" y="228" font-size="16" font-weight="700" fill="#0f172a">data/*.json</text>

  <g filter="url(#cardShadow)">
    <rect x="1200" y="180" width="240" height="64" rx="32" fill="#ffffff" stroke="#ddd6fe"/>
  </g>
  <circle cx="1238" cy="212" r="10" fill="#8b5cf6"/>
  <text x="1260" y="207" font-size="11" font-weight="700" fill="#8b5cf6" letter-spacing="1.5">AI</text>
  <text x="1260" y="228" font-size="16" font-weight="700" fill="#0f172a">OpenAI API</text>

  <g filter="url(#cardShadow)">
    <rect x="1560" y="180" width="240" height="64" rx="32" fill="#ffffff" stroke="#fde68a"/>
  </g>
  <circle cx="1598" cy="212" r="10" fill="#f59e0b"/>
  <text x="1620" y="207" font-size="11" font-weight="700" fill="#f59e0b" letter-spacing="1.5">EXTERNAL</text>
  <text x="1620" y="228" font-size="16" font-weight="700" fill="#0f172a">Tavily / Web APIs</text>

  <!-- LIFELINES -->
  <g stroke-dasharray="4,6" stroke-width="1.5">
    <line x1="240"  y1="252" x2="240"  y2="970" stroke="#0ea5e9"/>
    <line x1="600"  y1="252" x2="600"  y2="970" stroke="#6366f1"/>
    <line x1="960"  y1="252" x2="960"  y2="970" stroke="#10b981"/>
    <line x1="1320" y1="252" x2="1320" y2="970" stroke="#8b5cf6"/>
    <line x1="1680" y1="252" x2="1680" y2="970" stroke="#f59e0b"/>
  </g>

  <rect x="592" y="295" width="16" height="555" fill="#eef2ff" stroke="#c7d2fe"/>

  <!-- STEP 1 -->
  <g>
    <text x="420" y="285" font-size="11" font-weight="700" fill="#0ea5e9">1</text>
    <line x1="248" y1="295" x2="592" y2="295" stroke="#334155" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <text x="420" y="287" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">POST /api/generate-plan</text>
    <text x="420" y="310" font-size="12" fill="#64748b" text-anchor="middle">{ hypothesis, literature_qc, category_id, continue_from_plan_id }  +  header  x-organization-id</text>
  </g>

  <!-- PARALLEL GROUP -->
  <g>
    <rect x="270" y="332" width="1430" height="208" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="270" y="332" width="200" height="22" fill="#475569"/>
    <text x="280" y="348" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1">2&#215; PROMISE.ALL (FAN-OUT)</text>
  </g>

  <!-- Step 2 -->
  <g>
    <text x="780" y="370" font-size="11" font-weight="700" fill="#10b981">2</text>
    <line x1="608" y1="380" x2="952" y2="380" stroke="#334155" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <text x="780" y="372" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">getCategory  &#183;  listDocuments(org)  +  listDocuments(experiment)</text>
    <text x="780" y="395" font-size="12" fill="#64748b" text-anchor="middle">organization-scoped reads  &#183;  experiment docs only when continue_from_plan_id present</text>
    <line x1="952" y1="412" x2="608" y2="412" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDashed)"/>
    <text x="780" y="408" font-size="11" font-style="italic" fill="#94a3b8" text-anchor="middle">DocumentRecord[] &#183; Category (Zod-validated)</text>
  </g>

  <!-- Step 3 -->
  <g>
    <text x="960" y="442" font-size="11" font-weight="700" fill="#8b5cf6">3</text>
    <line x1="608" y1="452" x2="952" y2="452" stroke="#334155" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <line x1="952" y1="452" x2="1312" y2="452" stroke="#334155" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowR)"/>
    <text x="960" y="444" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">getActiveFeedbackContext  &#8594;  readAllFeedback  +  (cond.) embeddings.create</text>
    <text x="960" y="467" font-size="12" fill="#64748b" text-anchor="middle">3-bucket split (org / category / experiment)  &#183;  embed only when continuing a plan  &#183;  text-embedding-3-small</text>
    <line x1="1312" y1="484" x2="608" y2="484" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDashed)"/>
  </g>

  <!-- Step 4 -->
  <g>
    <text x="1140" y="514" font-size="11" font-weight="700" fill="#f59e0b">4</text>
    <line x1="608" y1="524" x2="1672" y2="524" stroke="#334155" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <text x="1140" y="516" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">searchProtocols &#183; searchSuppliers &#183; searchRegulatory  (Tavily)</text>
    <text x="1140" y="539" font-size="12" fill="#64748b" text-anchor="middle">3 concurrent calls in same Promise.all as step 3  &#183;  skipped without TAVILY_API_KEY  &#183;  per-source diagnostics</text>
  </g>

  <!-- Step 5 -->
  <g>
    <rect x="500" y="558" width="400" height="40" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="700" y="576" font-size="13" font-weight="700" fill="#92400e" text-anchor="middle">5  &#183;  Server (deterministic)</text>
    <text x="700" y="592" font-size="12" fill="#78350f" text-anchor="middle">mergeEvidenceCards  &#8594;  generateExperimentPlan { assessSafety  &#8594;  buildPlanUserPrompt }</text>
  </g>

  <!-- REPAIR LOOP -->
  <g>
    <rect x="270" y="618" width="1090" height="78" rx="8" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="270" y="618" width="200" height="22" fill="#5b21b6"/>
    <text x="280" y="634" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1">REPAIR LOOP (&#8804; 2 ATTEMPTS)</text>
  </g>

  <!-- Step 6 -->
  <g>
    <text x="960" y="660" font-size="11" font-weight="700" fill="#8b5cf6">6</text>
    <line x1="608" y1="670" x2="1312" y2="670" stroke="#334155" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <text x="960" y="662" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">chat.completions.create  &#183;  generateExperimentPlan  &#183;  gpt-4o, JSON mode</text>
    <text x="960" y="685" font-size="12" fill="#64748b" text-anchor="middle">on Zod parse error: append issues to prompt as validationErrorHint, retry  &#8594;  else deterministic fallback</text>
  </g>

  <!-- Step 7 -->
  <g>
    <text x="1140" y="716" font-size="11" font-weight="700" fill="#f59e0b">7</text>
    <line x1="608" y1="726" x2="1672" y2="726" stroke="#334155" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <text x="1140" y="718" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">searchSuppliersForMaterials  &#183;  tavilyMultiSearch (advanced + raw)</text>
    <text x="1140" y="741" font-size="12" fill="#64748b" text-anchor="middle">enrichPlanPricing &#8212; up to 6 unpriced materials, scoped to vendor domains; misses &#8594; estimatePricesAI</text>
  </g>

  <!-- Step 8 -->
  <g>
    <text x="960" y="766" font-size="11" font-weight="700" fill="#8b5cf6">8</text>
    <line x1="608" y1="776" x2="1312" y2="776" stroke="#334155" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowR)"/>
    <text x="960" y="768" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">estimatePricesAI  &#183;  approx prices for materials with no supplier hit</text>
  </g>

  <!-- Step 9 -->
  <g>
    <rect x="500" y="794" width="200" height="32" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="600" y="814" font-size="12.5" font-weight="700" fill="#92400e" text-anchor="middle">9  &#183;  recomputeBudget (deterministic)</text>
  </g>

  <!-- Step 10 -->
  <g>
    <text x="960" y="846" font-size="11" font-weight="700" fill="#8b5cf6">10</text>
    <line x1="608" y1="856" x2="1312" y2="856" stroke="#334155" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <text x="960" y="848" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">chat.completions.create  &#183;  critiquePlan  (max 6 findings)</text>
    <text x="960" y="871" font-size="12" fill="#64748b" text-anchor="middle">8 areas (controls, statistics, sample_size, validation, safety, feasibility, evidence, scope)  &#183;  AI &#8594; heuristic, never blocks</text>
  </g>

  <!-- Step 11 -->
  <g>
    <text x="420" y="905" font-size="11" font-weight="700" fill="#0ea5e9">11</text>
    <line x1="592" y1="915" x2="248" y2="915" stroke="#334155" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <text x="420" y="907" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">Response  &#183;  ExperimentPlan + meta</text>
    <text x="420" y="930" font-size="12" fill="#64748b" text-anchor="middle">{ ...plan, _generation, _evidence, _critique, _context }</text>
  </g>

  <!-- KEY TAKEAWAYS -->
  <line x1="60" y1="990" x2="1860" y2="990" stroke="#e2e8f0" stroke-width="1"/>

  <g font-size="13">
    <rect x="60" y="1010" width="430" height="56" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="80" y="1030" font-size="12" font-weight="700" fill="#3730a3" letter-spacing="1.5">1 REQUEST  &#183;  ~6&#8211;9 EXTERNAL CALLS</text>
    <text x="80" y="1052" fill="#1e293b">3 Tavily evidence + 0&#8211;1 embed + 2 chat (plan, critic) + 0&#8211;1 supplier multi + 0&#8211;1 estimate</text>

    <rect x="510" y="1010" width="430" height="56" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="530" y="1030" font-size="12" font-weight="700" fill="#5b21b6" letter-spacing="1.5">SCHEMA REPAIR LOOP &#183; &#8804; 2</text>
    <text x="530" y="1052" fill="#1e293b">Zod issues fed back as validationErrorHint  &#183;  else deterministic plan</text>

    <rect x="960" y="1010" width="430" height="56" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="980" y="1030" font-size="12" font-weight="700" fill="#047857" letter-spacing="1.5">FILESYSTEM = DATABASE</text>
    <text x="980" y="1052" fill="#1e293b">data/*.json &#183; tmp+rename &#183; single in-process write lock per store</text>

    <rect x="1410" y="1010" width="450" height="56" rx="10" fill="#fffbeb" stroke="#fde68a"/>
    <text x="1430" y="1030" font-size="12" font-weight="700" fill="#b45309" letter-spacing="1.5">DEGRADES GRACEFULLY</text>
    <text x="1430" y="1052" fill="#1e293b">No Tavily &#8594; evidence skipped  &#183;  No OpenAI &#8594; deterministic plan + heuristic critic</text>
  </g>
</svg>
